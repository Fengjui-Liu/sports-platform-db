<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportBoard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="home">
  <div class="app-shell">
    <main class="phone-shell">
      <header class="topbar slim">
        <div class="topbar-row">
          <div>
            <div class="page-title">SportBoard</div>
            <div class="brand-subtitle">Your Best Workout Partner</div>
          </div>
          <button id="header-auth-btn" class="gray-btn">登入</button>
        </div>
      </header>

      <section class="phone-home">
        <div class="hero-brand">
          <div class="brand-wordmark"><span>🏃‍♂️</span><span>SportBoard</span></div>
          <div class="brand-slogan">Your Best Workout Partner</div>
        </div>

        <div class="hero-actions">
          <a class="primary-btn" href="/board.html">前往專欄</a>
          <a class="gray-btn" href="/auth.html">登入 / 註冊</a>
        </div>

        <section class="panel-card">
          <div class="section-head">
            <h2>運動專欄</h2>
            <span class="helper-text">Boards</span>
          </div>
          <div id="board-grid" class="stack-list"></div>
        </section>

        <section class="panel-card">
          <div class="section-head">
            <h2>最新貼文</h2>
            <span class="helper-text">Latest</span>
          </div>
          <div id="latest-posts" class="stack-list"></div>
        </section>
      </section>

      <nav id="bottom-nav" class="bottom-nav"></nav>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
