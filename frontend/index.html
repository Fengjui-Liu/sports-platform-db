<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Platform</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="home">
  <header class="site-header">
    <div class="brand">
      <a href="/">Sports Platform</a>
      <span class="brand-tag">Find your next workout crew</span>
    </div>
    <nav id="site-nav" class="site-nav"></nav>
  </header>

  <main class="page-shell">
    <section class="hero-card">
      <div>
        <p class="eyebrow">運動社群資料平台</p>
        <h1>把訓練、貼文、揪團和身體紀錄放在同一個地方。</h1>
        <p class="hero-copy">瀏覽專欄、追最新貼文、收藏訓練計畫，直接開始自己的訓練節奏。</p>
      </div>
      <div class="hero-actions">
        <a class="primary-btn" href="/auth.html">登入 / 註冊</a>
        <a class="ghost-btn" href="/profile.html">查看個人頁</a>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2>運動專欄</h2>
        <p>選一個主題進去看貼文、計畫與揪團。</p>
      </div>
      <div id="board-grid" class="card-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>最新貼文</h2>
        <p>首頁直接看近期社群動態。</p>
      </div>
      <div id="latest-posts" class="stack-list"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
