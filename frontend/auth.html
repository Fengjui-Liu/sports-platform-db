<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 / 註冊 | Sports Platform</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="auth">
  <header class="site-header">
    <div class="brand">
      <a href="/">Sports Platform</a>
      <span class="brand-tag">Auth</span>
    </div>
    <nav id="site-nav" class="site-nav"></nav>
  </header>

  <main class="page-shell auth-shell">
    <section class="auth-card card">
      <div class="tab-row">
        <button class="tab-btn active" data-tab="login">登入</button>
        <button class="tab-btn" data-tab="register">註冊</button>
      </div>

      <form id="login-form" class="inline-form tab-panel active">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="primary-btn">登入</button>
      </form>

      <form id="register-form" class="inline-form tab-panel">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="primary-btn">建立帳號</button>
      </form>

      <div id="auth-status" class="status-line"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
