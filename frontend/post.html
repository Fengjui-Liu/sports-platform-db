<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貼文 | Sports Platform</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="posts">
  <header class="site-header">
    <div class="brand">
      <a href="/">Sports Platform</a>
      <span class="brand-tag">Post</span>
    </div>
    <nav id="site-nav" class="site-nav"></nav>
  </header>

  <main class="page-shell detail-shell">
    <section id="post-detail" class="card"></section>
    <section class="card">
      <div class="section-head">
        <h2>留言</h2>
        <p>看其他人的回覆，也可以直接加入討論。</p>
      </div>
      <form id="comment-form" class="inline-form">
        <input type="number" name="user_id" placeholder="你的 user_id" required>
        <textarea name="content" placeholder="留言內容" required></textarea>
        <button type="submit" class="primary-btn">送出留言</button>
      </form>
      <div id="comment-list" class="stack-list"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/post.js"></script>
</body>
</html>
