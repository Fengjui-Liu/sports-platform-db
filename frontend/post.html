<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貼文詳情 | SportBoard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="post">
  <div class="app-shell">
    <main class="phone-shell">
      <header class="topbar">
        <div class="topbar-row">
          <div>
            <div class="page-title">貼文詳情</div>
            <div class="brand-subtitle">內容、留言、按讚</div>
          </div>
          <a class="gray-btn" href="/board.html">返回專欄</a>
        </div>
      </header>

      <section class="page-content">
        <section id="post-detail" class="panel-card"></section>

        <section class="panel-card">
          <div class="section-head">
            <h2>留言區</h2>
            <span class="helper-text">Comments</span>
          </div>
          <form id="comment-form" class="inline-form">
            <input type="hidden" name="user_id">
            <textarea name="content" placeholder="新增留言" required></textarea>
            <button type="submit" class="primary-btn">送出留言</button>
          </form>
          <div id="comment-status" class="status-line"></div>
          <div id="comment-list" class="stack-list"></div>
        </section>
      </section>

      <nav id="bottom-nav" class="bottom-nav"></nav>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/post.js"></script>
</body>
</html>
