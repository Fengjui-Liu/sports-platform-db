<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訓練計畫 | SportBoard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="plans">
  <div class="app-shell">
    <main class="phone-shell">
      <header class="topbar">
        <div class="topbar-row">
          <div>
            <div class="page-title">訓練計畫</div>
            <div class="brand-subtitle">Workout Plan Detail</div>
          </div>
          <a class="gray-btn" href="/board.html">返回</a>
        </div>
      </header>

      <section class="page-content">
        <section id="plan-detail" class="panel-card"></section>
        <section class="panel-card">
          <div class="section-head">
            <h2>開始訓練</h2>
            <span class="helper-text">Session</span>
          </div>
          <form id="session-form" class="inline-form">
            <input type="number" name="user_id" placeholder="你的 user_id" required>
            <textarea name="notes" placeholder="這次訓練備註"></textarea>
            <input type="datetime-local" name="start_time" required>
            <input type="datetime-local" name="end_time" required>
            <button type="submit" class="primary-btn">建立訓練紀錄</button>
          </form>
        </section>
      </section>

      <nav id="bottom-nav" class="bottom-nav"></nav>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/workoutplan.js"></script>
</body>
</html>
