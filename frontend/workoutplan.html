<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訓練計畫 | Sports Platform</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="plans">
  <header class="site-header">
    <div class="brand">
      <a href="/">Sports Platform</a>
      <span class="brand-tag">Workout Plan</span>
    </div>
    <nav id="site-nav" class="site-nav"></nav>
  </header>

  <main class="page-shell detail-shell">
    <section id="plan-detail" class="card"></section>
    <section class="card">
      <div class="section-head">
        <h2>建立訓練紀錄</h2>
        <p>開始訓練後，可以直接補上一筆 session。</p>
      </div>
      <form id="session-form" class="inline-form">
        <input type="number" name="user_id" placeholder="你的 user_id" required>
        <textarea name="notes" placeholder="這次訓練備註"></textarea>
        <label>
          開始時間
          <input type="datetime-local" name="start_time" required>
        </label>
        <label>
          結束時間
          <input type="datetime-local" name="end_time" required>
        </label>
        <button type="submit" class="primary-btn">開始訓練</button>
      </form>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/workoutplan.js"></script>
</body>
</html>
