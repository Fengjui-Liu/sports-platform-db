<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人頁 | Sports Platform</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="profile">
  <header class="site-header">
    <div class="brand">
      <a href="/">Sports Platform</a>
      <span class="brand-tag">Profile</span>
    </div>
    <nav id="site-nav" class="site-nav"></nav>
  </header>

  <main class="page-shell">
    <section class="profile-layout">
      <article id="profile-card" class="card"></article>
      <article class="card">
        <div class="section-head">
          <h2>更新個人資料</h2>
          <p>修改自介與頭像網址。</p>
        </div>
        <form id="profile-form" class="inline-form">
          <textarea name="bio" placeholder="自我介紹"></textarea>
          <input type="url" name="profile_image" placeholder="頭像網址">
          <button type="submit" class="primary-btn">更新資料</button>
        </form>
      </article>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>身體數據圖表</h2>
        <p>最近的體重與體脂變化。</p>
      </div>
      <div id="bodyrecord-chart" class="chart-shell"></div>
      <form id="bodyrecord-form" class="inline-form">
        <input type="number" name="weight" placeholder="體重 kg" step="0.1" required>
        <input type="number" name="height" placeholder="身高 cm" step="0.1" required>
        <input type="number" name="body_fat" placeholder="體脂 %" step="0.1" required>
        <input type="datetime-local" name="recorded_at">
        <button type="submit" class="primary-btn">新增身體數據</button>
      </form>
    </section>

    <section class="three-up">
      <article class="card">
        <div class="section-head">
          <h2>我的貼文</h2>
          <p>最近發文紀錄。</p>
        </div>
        <div id="profile-posts" class="stack-list compact-list"></div>
      </article>
      <article class="card">
        <div class="section-head">
          <h2>訓練紀錄</h2>
          <p>所有 session 一覽。</p>
        </div>
        <div id="profile-sessions" class="stack-list compact-list"></div>
      </article>
      <article class="card">
        <div class="section-head">
          <h2>收藏計畫</h2>
          <p>保留以後要做的訓練。</p>
        </div>
        <div id="profile-saved-plans" class="stack-list compact-list"></div>
      </article>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
