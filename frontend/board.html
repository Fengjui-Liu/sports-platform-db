<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專欄 | Sports Platform</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="boards">
  <header class="site-header">
    <div class="brand">
      <a href="/">Sports Platform</a>
      <span class="brand-tag">Board</span>
    </div>
    <nav id="site-nav" class="site-nav"></nav>
  </header>

  <main class="page-shell">
    <section id="board-hero" class="hero-card compact"></section>

    <section class="toolbar-card">
      <div class="tab-row">
        <button class="tab-btn active" data-tab="posts">貼文</button>
        <button class="tab-btn" data-tab="plans">訓練計畫</button>
        <button class="tab-btn" data-tab="invitations">揪團</button>
      </div>
      <form id="post-form" class="inline-form">
        <input type="number" name="user_id" placeholder="你的 user_id" required>
        <input type="text" name="post_type" placeholder="貼文類型" required>
        <input type="url" name="image_url" placeholder="圖片網址（可留空）">
        <textarea name="content" placeholder="分享今天的訓練內容" required></textarea>
        <button type="submit" class="primary-btn">新增貼文</button>
      </form>
    </section>

    <section id="tab-posts" class="tab-panel active">
      <div id="board-posts" class="stack-list"></div>
    </section>

    <section id="tab-plans" class="tab-panel">
      <div id="board-plans" class="card-grid two-col"></div>
    </section>

    <section id="tab-invitations" class="tab-panel">
      <form id="invitation-form" class="inline-form card">
        <h3>建立揪團</h3>
        <input type="number" name="user_id" placeholder="你的 user_id" required>
        <input type="text" name="title" placeholder="活動標題" required>
        <input type="text" name="location" placeholder="地點" required>
        <input type="datetime-local" name="event_time" required>
        <input type="number" name="max_participants" placeholder="人數上限" min="1" required>
        <button type="submit" class="primary-btn">送出揪團</button>
      </form>
      <div id="board-invitations" class="stack-list"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/board.js"></script>
</body>
</html>
